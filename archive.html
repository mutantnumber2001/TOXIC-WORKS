<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOXIC WORKS</title>
    <style>
        /* --- CSS --- */

        /* 1. ノイズレイヤーの設定 */
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* ドットを少し大きく、色を白っぽくして目立たせる */
            background: radial-gradient(circle, rgba(14, 13, 13, 0.822) 15px, transparent 15px);
            background-size: 4px 4px;
            pointer-events: none;
            z-index: 9999;
            /* overlayからscreenに変更して、暗い場所でも見えるようにする */
            mix-blend-mode: screen;
            animation: noise-anim 0.15s infinite;
            /* アニメーション速度を少し上げたよ */
        }

        /* ノイズを動かすアニメーションの定義 */
        @keyframes noise-anim {
            0% {
                transform: translate(0, 0);
                opacity: 0.3;
            }

            15% {
                transform: translate(-8px, 4px);
                opacity: 0.6;
            }

            /* 瞬間的に大きくズレる */
            30% {
                transform: translate(5px, -5px);
                opacity: 0.2;
            }

            45% {
                transform: translate(-4px, 8px);
                opacity: 0.7;
            }

            60% {
                transform: translate(7px, 2px);
                opacity: 0.3;
            }

            75% {
                transform: translate(-6px, -3px);
                opacity: 0.5;
            }

            90% {
                transform: translate(3px, 6px);
                opacity: 0.2;
            }

            100% {
                transform: translate(0, 0);
                opacity: 0.4;
            }
        }

        /* 2. 両サイドの警告テキスト */
        .warning-text {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            font-weight: bold;
            color: rgba(204, 255, 0, 0.4);
            letter-spacing: 0.5rem;
            writing-mode: vertical-rl;
            text-transform: uppercase;
            z-index: 10000;
            /* ノイズ(9999)よりもさらに上に設定 */
            color: #00c3ff;
            /* 透明度を一度なくして、ハッキリ表示させてみよう */
            text-shadow: 0 0 10px rgba(204, 255, 0, 0.8);
            /* ネオンっぽく光らせる */
            pointer-events: none;
            font-family: sans-serif;
        }

        .warning-text.left {
            left: 20px;
        }

        .warning-text.right {
            right: 20px;
            writing-mode: vertical-lr;
        }
.warning-text {
  /* 0.0（完全に透明）〜 1.0（完全に不透明）の間で指定 */
  opacity: 0.6; 
}
        body {
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Arial, sans-serif;
            background-color: #1a001a;
            background-image: url('パターン２.png');
            background-repeat: repeat;
            background-size: 300px auto;
            background-attachment: fixed;
        }

        .corner-decoration {
            position: fixed;
            width: 200px;
            height: auto;
            z-index: 100;
            pointer-events: none;
        }

        .top-left {
            top: 0;
            left: 0;
        }

        .top-right {
            top: 0;
            right: 0;
        }

        .bottom-left {
            bottom: 0;
            left: 0;
        }

        .bottom-right {
            bottom: 0;
            right: 0;
        }

        /* ▼ アーカイブ専用のスタイル ▼ */
        .archive-container {
            position: relative;
            max-width: 1000px;
            margin: 40px auto;
            background-color: rgba(20, 20, 20, 0.9);
            border: 2px solid #ccff00;
            padding: 50px;
            z-index: 10;
        }

        .archive-title {
            font-family: Georgia, serif;
            font-size: 3rem;
            color: #ccff00;
            text-transform: uppercase;
            margin-bottom: 40px;
            text-align: center;
            text-shadow: 0 0 15px rgba(204, 255, 0, 0.6);
        }

        /* 制作物を並べるグリッド */
        .work-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        /* 各制作物のカード */
        .work-item {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(204, 255, 0, 0.3);
            overflow: hidden;
            transition: 0.3s;
            position: relative;
        }

        .work-item:hover {
            border-color: #ccff00;
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(204, 255, 0, 0.3);
        }

        .work-img {
    width: 100%;
    height: 200px; /* 枠の高さは維持 */
    object-fit: contain; /* 切り抜かずに全体を表示 */
    background: #000; /* 余白を黒で埋める */
    filter: grayscale(0.5);
    transition: 0.3s;
}

        .work-item:hover .work-img {
            filter: grayscale(0); /* ホバーで鮮やかに */
        }

        .work-info {
            padding: 15px;
            background: rgba(20, 20, 20, 0.8);
        }

        .work-info h3 {
            margin: 0;
            font-size: 1rem;
            color: #ccff00;
        }

        .back-link {
            display: block;
            width: fit-content;
            margin: 0 auto;
            color: #ccff00;
            text-decoration: none;
            border: 1px solid #ccff00;
            padding: 10px 20px;
            transition: 0.3s;
        }

        .back-link:hover { background: #ccff00; color: #000; }
    </style>
</head>
<body>

    <div class="warning-text left">WARNING : HIGH TOXICITY</div>
    <div class="warning-text right">RESTRICTED AREA : LEVEL 04</div>

    <div class="archive-container">

            <div class="work-item">

                    <h3>PROJECT : FAKE PROMOTION</h3>
                </div>

            <div class="work-item">

                <div class="work-info">
                    <h3>PROJECT : FAKE PROMOTION</h3>

            <div class="work-item">
                <img src="" class="work-img" alt="Work 03">

                </div>

        </div>

        <a href="index.html" class="back-link">BACK TO HOME</a>
    </div>

</html>
