<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOXIC WORKS</title>
    <style>
        /* --- CSS --- */

        /* 1. ノイズレイヤーの設定 */
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(14, 13, 13, 0.822) 15px, transparent 15px);
            background-size: 4px 4px;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: screen;
            animation: noise-anim 0.15s infinite;
        }

        @keyframes noise-anim {
            0% { transform: translate(0, 0); opacity: 0.3; }
            15% { transform: translate(-8px, 4px); opacity: 0.6; }
            30% { transform: translate(5px, -5px); opacity: 0.2; }
            45% { transform: translate(-4px, 8px); opacity: 0.7; }
            60% { transform: translate(7px, 2px); opacity: 0.3; }
            75% { transform: translate(-6px, -3px); opacity: 0.5; }
            90% { transform: translate(3px, 6px); opacity: 0.2; }
            100% { transform: translate(0, 0); opacity: 0.4; }
        }

        /* 2. 両サイドの警告テキスト */
        .warning-text {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 0.5rem;
            writing-mode: vertical-rl;
            text-transform: uppercase;
            z-index: 10000;
            color: #00c3ff;
            text-shadow: 0 0 10px rgba(204, 255, 0, 0.8);
            pointer-events: none;
            font-family: sans-serif;
        }

        .warning-text.left { left: 20px; }
        .warning-text.right { right: 20px; writing-mode: vertical-lr; }

        body {
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Arial, sans-serif;
            background-color: #1a001a;
            background-image: url('パターン２.png');
            background-repeat: repeat;
            background-size: 300px auto;
            background-attachment: fixed;
            /* スマホで横スクロールが発生しないようにする */
            overflow-x: hidden; 
        }

        .corner-decoration {
            position: fixed;
            width: 200px;
            height: auto;
            z-index: 100;
            pointer-events: none;
        }

        .top-left { top: 0; left: 0; }
        .top-right { top: 0; right: 0; }
        .bottom-left { bottom: 0; left: 0; }
        .bottom-right { bottom: 0; right: 0; }

        /* 3. コンテナ（メインエリア）のグリッチ揺れ */
        .container {
            max-width: 90%;
            width: 800px;
            min-height: 100vh;
            margin: 20px auto;
            background-color: rgba(30, 30, 30, 0.8);
            background-image: url('ロゴ.svg');
            background-repeat: no-repeat;
            background-position: center;
            background-size: 100%;
            border: 1px solid #ccff00;
            box-shadow: 0 0 20px rgba(204, 255, 0, 0.2);
            padding: 70px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            z-index: 10;
            position: relative;
            animation: container-glitch 5s infinite;
        }

        @keyframes container-glitch {
            0%, 90%, 100% { transform: translate(0, 0); }
            92% { transform: translate(-2px, 2px); }
            94% { transform: translate(2px, -2px); }
            96% { transform: translate(-1px, 1px); }
        }

        .btn-group {
            position: relative;
            width: 100%;
            height: 1000px; 
            margin: 0 auto;
        }

        .btn-img-link {
            position: absolute; 
            transition: 0.1s, top 0.5s, left 0.5s; 
        }

        /* 4. ボタンのホバーエフェクト */
        .btn-img-link img {
            display: block;
            width: 280px; 
            height: auto;
            filter: drop-shadow(0 0 5px rgba(204, 255, 0, 0.5));
            transition: 0.1s;
        }

        .btn-img-link:hover img {
            filter: drop-shadow(0 0 15px rgba(204, 255, 0, 1)) invert(1);
            transform: scale(1.4) rotate(5deg); 
            animation: button-shake 0.2s infinite;
        }

        @keyframes button-shake {
            0% { transform: translate(0, 0) rotate(2deg); }
            25% { transform: translate(-2px, 2px) rotate(2deg); }
            50% { transform: translate(2px, -2px) rotate(2deg); }
            75% { transform: translate(-1px, -1px) rotate(2deg); }
            100% { transform: translate(0, 0) rotate(2deg); }
        }

        /* =========================================
           スマホ用のレスポンシブ設定 (画面幅768px以下)
           ========================================= */
        @media screen and (max-width: 768px) {
            .container {
                width: 95%; /* 横幅を画面いっぱいに */
                padding: 30px; /* 余白を狭く */
                min-height: 80vh; 
            }
            .btn-group {
                height: 600px; /* スマホだと縦幅が長すぎると間延びするので調整 */
            }
            .btn-img-link img {
                width: 140px; /* スマホ用にボタン画像を半分くらいのサイズに縮小 */
            }
            .btn-img-link:hover img {
                transform: scale(1.2) rotate(5deg); /* 拡大率もスマホに合わせて少し抑えめに */
            }
            .warning-text {
                font-size: 0.8rem; /* 警告テキストを小さく */
                letter-spacing: 0.2rem;
            }
            .warning-text.left { left: 5px; }
            .warning-text.right { right: 5px; }
            
            .corner-decoration {
                width: 100px; /* 四隅の装飾も小さくして邪魔にならないように */
            }
        }
    </style>
</head>

<body>
    <div class="noise-overlay"></div>

    <div class="warning-text left">WARNING : HIGH TOXICITY</div>
    <div class="warning-text right">RESTRICTED AREA : LEVEL 04</div>

    <img src="左上.png" class="corner-decoration top-left" alt="装飾左上">
    <img src="右上.png" class="corner-decoration top-right" alt="装飾右上">
    <img src="左下.png" class="corner-decoration bottom-left" alt="装飾左下">
    <img src="右下.png" class="corner-decoration bottom-right" alt="装飾右下">

    <div class="container">
        <div class="btn-group">
            <a href="profile.html" class="btn-img-link">
                <img src="WhoamI.png" alt="ABOUT">
            </a>
            <a href="archive.html" class="btn-img-link"><img src="archive.png" alt="WORKS"></a>
            <a href="signal.html" class="btn-img-link"><img src="Signal.png" alt="CONTACT"></a>
        </div>
    </div>

    <script>
        window.onload = function() {
            const buttons = document.querySelectorAll('.btn-img-link');
            const container = document.querySelector('.btn-group');
            const placedRects = []; 

            const cw = container.clientWidth;
            const ch = container.clientHeight;

            // スマホなどの画面幅に合わせて禁止エリア(ロゴ部分)を柔軟に計算する
            // コンテナ幅の80%（最大500px）を禁止エリアの横幅にする
            const fw = Math.min(500, cw * 0.8); 
            // 高さは横幅に合わせて比率で縮める（最大400px）
            const fh = Math.min(400, fw * 0.8); 

            const forbiddenRect = {
                x: (cw / 2) - (fw / 2),
                y: (ch / 2) - (fh / 2),
                w: fw,
                h: fh
            };

            buttons.forEach(btn => {
                const bw = btn.clientWidth;
                const bh = btn.clientHeight;
                // ボタンがコンテナからはみ出さないように最大値を計算
                // (もしボタンが大きすぎる場合は0未満になるのでMath.maxで0にする)
                const maxX = Math.max(0, cw - bw);
                const maxY = Math.max(0, ch - bh);

                let rx, ry;
                let isSafe = false;
                let attempts = 0;

                // 安全な場所が見つかるまで最大200回リトライ
                while (!isSafe && attempts < 200) {
                    rx = Math.floor(Math.random() * maxX);
                    ry = Math.floor(Math.random() * maxY);

                    // 1. ロゴ区域と重なっているか判定
                    const overlapForbidden = !(
                        rx + bw < forbiddenRect.x ||
                        rx > forbiddenRect.x + forbiddenRect.w ||
                        ry + bh < forbiddenRect.y ||
                        ry > forbiddenRect.y + forbiddenRect.h
                    );

                    // 2. 他のボタンと重なっているか判定
                    const overlapOthers = placedRects.some(rect => {
                        return !(
                            rx + bw < rect.x ||
                            rx > rect.x + rect.w ||
                            ry + bh < rect.y ||
                            ry > rect.y + rect.h
                        );
                    });

                    // 「ロゴとも重ならず」かつ「他のボタンとも重ならない」ならOK
                    if (!overlapForbidden && !overlapOthers) {
                        isSafe = true;
                    }
                    attempts++;
                }

                // 場所を記録して適用
                placedRects.push({ x: rx, y: ry, w: bw, h: bh });
                btn.style.left = rx + 'px';
                btn.style.top = ry + 'px';
                
                const randomRotate = Math.floor(Math.random() * 20) - 10;
                btn.style.transform = `rotate(${randomRotate}deg)`;
            });
        };
    </script>
</body>

</html>
