<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOXIC WORKS</title>
    <style>
        /* --- CSS --- */

        /* 1. ノイズレイヤーの設定 */
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* ドットを少し大きく、色を白っぽくして目立たせる */
            background: radial-gradient(circle, rgba(14, 13, 13, 0.822) 15px, transparent 15px);
            background-size: 4px 4px;
            pointer-events: none;
            z-index: 9999;
            /* overlayからscreenに変更して、暗い場所でも見えるようにする */
            mix-blend-mode: screen;
            animation: noise-anim 0.15s infinite;
            /* アニメーション速度を少し上げたよ */
        }

        /* ノイズを動かすアニメーションの定義 */
        @keyframes noise-anim {
            0% {
                transform: translate(0, 0);
                opacity: 0.3;
            }

            15% {
                transform: translate(-8px, 4px);
                opacity: 0.6;
            }

            /* 瞬間的に大きくズレる */
            30% {
                transform: translate(5px, -5px);
                opacity: 0.2;
            }

            45% {
                transform: translate(-4px, 8px);
                opacity: 0.7;
            }

            60% {
                transform: translate(7px, 2px);
                opacity: 0.3;
            }

            75% {
                transform: translate(-6px, -3px);
                opacity: 0.5;
            }

            90% {
                transform: translate(3px, 6px);
                opacity: 0.2;
            }

            100% {
                transform: translate(0, 0);
                opacity: 0.4;
            }
        }

        /* 2. 両サイドの警告テキスト */
        .warning-text {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            font-weight: bold;
            color: rgba(204, 255, 0, 0.4);
            letter-spacing: 0.5rem;
            writing-mode: vertical-rl;
            text-transform: uppercase;
            z-index: 10000;
            /* ノイズ(9999)よりもさらに上に設定 */
            color: #00c3ff;
            /* 透明度を一度なくして、ハッキリ表示させてみよう */
            text-shadow: 0 0 10px rgba(204, 255, 0, 0.8);
            /* ネオンっぽく光らせる */
            pointer-events: none;
            font-family: sans-serif;
        }

        .warning-text.left {
            left: 20px;
        }

        .warning-text.right {
            right: 20px;
            writing-mode: vertical-lr;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Arial, sans-serif;
            background-color: #1a001a;
            background-image: url('パターン２.png');
            background-repeat: repeat;
            background-size: 300px auto;
            background-attachment: fixed;
        }

        .corner-decoration {
            position: fixed;
            width: 200px;
            height: auto;
            z-index: 100;
            pointer-events: none;
        }

        .top-left {
            top: 0;
            left: 0;
        }

        .top-right {
            top: 0;
            right: 0;
        }

        .bottom-left {
            bottom: 0;
            left: 0;
        }

        .bottom-right {
            bottom: 0;
            right: 0;
        }

        .container {
            position: relative;
            max-width: 90%;
            width: 800px;
            min-height: 80vh;
            margin: 30px auto;
            background-color: rgba(238, 255, 2, 0.8);
            
            /* 少し暗く調整 */
            background-image: url('ロゴ2.svg');
            background-repeat: no-repeat;
            background-position: top;
            background-size: 100%;
            outline: 5px solid #093d02;
            outline-offset: -15px;
            box-shadow: 0 0 20px rgba(204, 255, 0, 0.2);
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            z-index: 10;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            width: 100%;
        }

        .btn-img-link {
            display: inline-block;
            transition: 0.3s;
        }

        .btn-img-link img {
            display: block;
            width: 140px;
            height: auto;
            filter: drop-shadow(0 0 5px rgba(204, 255, 0, 0.5));
            transition: 0.3s;
        }

        .btn-img-link:hover img {
            filter: drop-shadow(0 0 15px rgba(204, 255, 0, 1));
            transform: scale(1.1);
        }
    </style>
</head>

<body>
    <div class="noise-overlay"></div>

    <div class="warning-text left">WARNING : HIGH TOXICITY</div>
    <div class="warning-text right">RESTRICTED AREA : LEVEL 04</div>

    <img src="左上.png" class="corner-decoration top-left" alt="装飾左上">
    <img src="右上.png" class="corner-decoration top-right" alt="装飾右上">
    <img src="左下.png" class="corner-decoration bottom-left" alt="装飾左下">
    <img src="右下.png" class="corner-decoration bottom-right" alt="装飾右下">

    <div class="container">
        <div class="btn-group">
            <a href="profile.html" class="btn-img-link">
                <img src="WhoamI.png" alt="ABOUT">
            </a>

            <a href="archive.html" class="btn-img-link"><img src="archive.png" alt="WORKS"></a>
            <a href="skill.html" class="btn-img-link"><img src="skills.png" alt="SKILLS"></a>
            <a href="signal.html" class="btn-img-link"><img src="Signal.png" alt="CONTACT"></a>
        </div>
    </div>
    </div>
</body>

</html>
