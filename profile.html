<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOXIC WORKS</title>
    <style>
        /* --- CSS --- */

        /* 1. ノイズレイヤーの設定 */
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(14, 13, 13, 0.822) 15px, transparent 15px);
            background-size: 4px 4px;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: screen;
            animation: noise-anim 0.15s infinite;
        }

        @keyframes noise-anim {
            0% { transform: translate(0, 0); opacity: 0.3; }
            15% { transform: translate(-8px, 4px); opacity: 0.6; }
            30% { transform: translate(5px, -5px); opacity: 0.2; }
            45% { transform: translate(-4px, 8px); opacity: 0.7; }
            60% { transform: translate(7px, 2px); opacity: 0.3; }
            75% { transform: translate(-6px, -3px); opacity: 0.5; }
            90% { transform: translate(3px, 6px); opacity: 0.2; }
            100% { transform: translate(0, 0); opacity: 0.4; }
        }

        /* 2. 両サイドの警告テキスト */
        .warning-text {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 0.5rem;
            writing-mode: vertical-rl;
            text-transform: uppercase;
            z-index: 10000;
            color: #00c3ff;
            text-shadow: 0 0 10px rgba(204, 255, 0, 0.8);
            pointer-events: none;
            font-family: sans-serif;
            opacity: 0.6; 
        }

        .warning-text.left {
            left: 20px;
        }

        .warning-text.right {
            right: 20px;
            writing-mode: vertical-lr;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Arial, sans-serif;
            background-color: #1a001a;
            background-image: url('パターン２.png');
            background-repeat: repeat;
            background-size: 300px auto;
            background-attachment: fixed;
        }

        .corner-decoration {
            position: fixed;
            width: 200px;
            height: auto;
            z-index: 100;
            pointer-events: none;
        }

        .top-left { top: 0; left: 0; }
        .top-right { top: 0; right: 0; }
        .bottom-left { bottom: 0; left: 0; }
        .bottom-right { bottom: 0; right: 0; }

        .container {
            position: relative;
            max-width: 90%;
            width: 800px;
            min-height: 80vh;
            margin: 30px auto;
            background-color: rgba(30, 30, 30, 0.8);
            background-image: url('ロゴ - コピー.svg');
            background-repeat: no-repeat;
            background-position: center 20%;
            background-size: 80%;
            border: 1px solid #ccff00;
            box-shadow: 0 0 20px rgba(204, 255, 0, 0.2);
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            z-index: 10;
        }

        .profile-container {
            position: relative;
            max-width: 900px;
            margin: 40px auto;
            background-color: rgba(20, 20, 20, 0.9);
            border: 2px solid #ccff00;
            padding: 50px;
            z-index: 10;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 40px;
            margin-bottom: 30px;
        }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: #ccff00;
            text-decoration: none;
            border: 1px solid #ccff00;
            padding: 10px 20px;
            transition: 0.3s;
        }

        .back-link:hover {
            background-color: #ccff00;
            color: #000;
        }

        .profile-icon img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            filter: drop-shadow(0 0 10px rgba(204, 255, 0, 0.5));
            border: 2px solid #ccff00;
        }

        .profile-body {
            line-height: 1.8;
            font-size: 1.1rem;
            color: rgba(204, 255, 0, 0.6);
            /* タイピングが終わるまで最低限の高さを確保してガタつきを防ぐ */
            min-height: 200px; 
        }

        /* pタグの初期状態を空にしておくための保険 */
        .text-content p {
            margin-bottom: 1em;
            min-height: 1.8em; 
        }

        .profile-title {
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-size: 3rem;
            color: #ccff00;
            text-transform: uppercase;
            margin: 0;
            text-shadow: 0 0 15px rgba(204, 255, 0, 0.6);
        }

        /* --- 新規追加：点滅するカーソルのCSS --- */
        .typing-cursor {
            display: inline-block;
            width: 10px;
            height: 1.2rem;
            background-color: #ccff00;
            vertical-align: middle;
            margin-left: 4px;
            animation: blink 0.8s step-end infinite;
            box-shadow: 0 0 5px #ccff00;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>

<body>
    <div class="noise-overlay"></div>
    <div class="warning-text left">WARNING : HIGH TOXICITY</div>
    <div class="warning-text right">RESTRICTED AREA : LEVEL 04</div>
    <img src="左上.png" class="corner-decoration top-left" alt="装飾左上">
    <img src="右上.png" class="corner-decoration top-right" alt="装飾右上">
    <img src="左下.png" class="corner-decoration bottom-left" alt="装飾左下">
    <img src="右下.png" class="corner-decoration bottom-right" alt="装飾右下">
    
    <div class="profile-container">
        <header class="profile-header">
            <div class="profile-icon">
                <img src="icon.jpg.jpg" alt="Icon">
            </div>
            <h1 class="profile-title">Who am I ?</h1>
        </header>

        <main class="profile-body">
            <div class="text-content">
                <p>名前：ヒビ タスク</p>
                <p>2001年。愛知県生まれ。もともとWeb商材の営業をしていたが、鬱病になり退職。</p>
                <p>失業手当のために行ったハローワークでデザイナーコースを勧められ、まんまとデザインの勉強中。</p>
                <p>せっかくならwebデザインも一緒に学びたいと思い、独学でコーディングの勉強中。</p>
                <p>趣味　音楽アートトイの収集、筋トレ、ゲーム</p>
            </div>
        </main>

        <a href="index.html" class="back-link">BACK TO HOME</a>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const paragraphs = document.querySelectorAll('.text-content p');
            const typeSpeed = 40; // 1文字が出るスピード（ミリ秒）。数字を小さくすると速くなる。
            const nextLineDelay = 400; // 次の行にいくまでのタメ時間（ミリ秒）
            
            // 元のテキストを保存して、画面から一旦消す
            const textArray = [];
            paragraphs.forEach(p => {
                textArray.push(p.textContent);
                p.textContent = '';
            });

            let pIndex = 0;
            let charIndex = 0;

            // カーソル要素を作成
            const cursor = document.createElement('span');
            cursor.className = 'typing-cursor';

            function typeWriter() {
                if (pIndex < paragraphs.length) {
                    // 現在の行にカーソルを移動
                    paragraphs[pIndex].appendChild(cursor);

                    if (charIndex < textArray[pIndex].length) {
                        // カーソルの前に1文字ずつ追加していく
                        const textNode = document.createTextNode(textArray[pIndex].charAt(charIndex));
                        paragraphs[pIndex].insertBefore(textNode, cursor);
                        charIndex++;
                        setTimeout(typeWriter, typeSpeed);
                    } else {
                        // 1行打ち終わったら次の行へ
                        pIndex++;
                        charIndex = 0;
                        setTimeout(typeWriter, nextLineDelay);
                    }
                } else {
                    // 全部打ち終わった後もカーソルを点滅させたままにする（ターミナルっぽさ重視）
                    // カーソルを消したい場合は下の // を外す
                    // cursor.remove();
                }
            }

            // 画面が開いてから少しタメてスタート（0.5秒後）
            setTimeout(typeWriter, 500); 
        });
    </script>
</body>

</html>
