<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOXIC WORKS</title>
    <style>
        /* --- CSS --- */

        /* 1. ノイズレイヤーの設定 */
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* ドットを少し大きく、色を白っぽくして目立たせる */
            background: radial-gradient(circle, rgba(14, 13, 13, 0.822) 15px, transparent 15px);
            background-size: 4px 4px;
            pointer-events: none;
            z-index: 9999;
            /* overlayからscreenに変更して、暗い場所でも見えるようにする */
            mix-blend-mode: screen;
            animation: noise-anim 0.15s infinite;
            /* アニメーション速度を少し上げたよ */
        }

        /* ノイズを動かすアニメーションの定義 */
        @keyframes noise-anim {
            0% {
                transform: translate(0, 0);
                opacity: 0.3;
            }

            15% {
                transform: translate(-8px, 4px);
                opacity: 0.6;
            }

            /* 瞬間的に大きくズレる */
            30% {
                transform: translate(5px, -5px);
                opacity: 0.2;
            }

            45% {
                transform: translate(-4px, 8px);
                opacity: 0.7;
            }

            60% {
                transform: translate(7px, 2px);
                opacity: 0.3;
            }

            75% {
                transform: translate(-6px, -3px);
                opacity: 0.5;
            }

            90% {
                transform: translate(3px, 6px);
                opacity: 0.2;
            }

            100% {
                transform: translate(0, 0);
                opacity: 0.4;
            }
        }

        /* 2. 両サイドの警告テキスト */
        .warning-text {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            font-weight: bold;
            color: rgba(204, 255, 0, 0.4);
            letter-spacing: 0.5rem;
            writing-mode: vertical-rl;
            text-transform: uppercase;
            z-index: 10000;
            /* ノイズ(9999)よりもさらに上に設定 */
            color: #00c3ff;
            /* 透明度を一度なくして、ハッキリ表示させてみよう */
            text-shadow: 0 0 10px rgba(204, 255, 0, 0.8);
            /* ネオンっぽく光らせる */
            pointer-events: none;
            font-family: sans-serif;
        }

        .warning-text.left {
            left: 20px;
        }

        .warning-text.right {
            right: 20px;
            writing-mode: vertical-lr;
        }
        .warning-text {
  /* 0.0（完全に透明）〜 1.0（完全に不透明）の間で指定 */
  opacity: 0.6; 
}

        body {
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Arial, sans-serif;
            background-color: #1a001a;
            background-image: url('パターン２.png');
            background-repeat: repeat;
            background-size: 300px auto;
            background-attachment: fixed;
        }

        .corner-decoration {
            position: fixed;
            width: 200px;
            height: auto;
            z-index: 100;
            pointer-events: none;
        }

        .top-left {
            top: 0;
            left: 0;
        }

        .top-right {
            top: 0;
            right: 0;
        }

        .bottom-left {
            bottom: 0;
            left: 0;
        }

        .bottom-right {
            bottom: 0;
            right: 0;
        }

        .container {
            position: relative;
            max-width: 90%;
            width: 800px;
            min-height: 80vh;
            margin: 30px auto;
            background-color: rgba(30, 30, 30, 0.8);
            /* 少し暗く調整 */
            background-image: url('ロゴ - コピー.svg');
            background-repeat: no-repeat;
            background-position: center 20%;
            background-size: 80%;
            border: 1px solid #ccff00;
            box-shadow: 0 0 20px rgba(204, 255, 0, 0.2);
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            z-index: 10;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            width: 100%;
        }

        .btn-img-link {
            display: inline-block;
            transition: 0.3s;
        }

        .btn-img-link img {
            display: block;
            width: 140px;
            height: auto;
            filter: drop-shadow(0 0 5px rgba(204, 255, 0, 0.5));
            transition: 0.3s;
        }

        .btn-img-link:hover img {
            filter: drop-shadow(0 0 15px rgba(204, 255, 0, 1));
            transform: scale(1.1);
        }

        .profile-container {
            position: relative;
            max-width: 900px;
            margin: 40px auto;
            background-color: rgba(20, 20, 20, 0.9);
            border: 2px solid #ccff00;
            padding: 50px;
            z-index: 10;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 40px;
            margin-bottom: 30px;
        }

        /* 戻るボタンのスタイル */
        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: #ccff00;
            text-decoration: none;
            border: 1px solid #ccff00;
            padding: 10px 20px;
            transition: 0.3s;
        }

        .back-link:hover {
            background-color: #ccff00;
            color: #000;
        }

        /* アイコン画像を小さく＆丸くする */
        .profile-icon img {
            width: 80px;
            /* 120pxから小さく変更（好みのサイズで調整してね） */
            height: 80px;
            /* widthと同じ数字にするのが綺麗な丸を作るコツ */
            border-radius: 50%;
            /* これが画像を完全な円形にするコード！ */
            object-fit: cover;
            /* 元の画像が正方形じゃなくても歪まないようにする */
            filter: drop-shadow(0 0 10px rgba(204, 255, 0, 0.5));
            /* ネオンの光彩はそのまま */
            border: 2px solid #ccff00;
            /* オマケ：丸い画像の周りにネオンの枠線をつけるとさらにカッコいいよ */
        }

        /* 本文のテキスト設定 */
        .profile-body {
            line-height: 1.8;
            font-size: 1.1rem;
            color: rgba(204, 255, 0, 0.6);
            /* ここを好きな色番号に変更！（今は真っ白に設定） */
        }

        /* タイトルの色も変えたい場合はここ */
        .profile-title {
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-size: 3rem;
            color: #ccff00;
            /* TOXICなネオンイエロー。白にするなら #ffffff など */
            text-transform: uppercase;
            margin: 0;
            text-shadow: 0 0 15px rgba(204, 255, 0, 0.6);
        }
    </style>
</head>

<body>
    <div class="noise-overlay"></div>
    <div class="warning-text left">WARNING : HIGH TOXICITY</div>
    <div class="warning-text right">RESTRICTED AREA : LEVEL 04</div>
    <img src="左上.png" class="corner-decoration top-left" alt="装飾左上">
    <img src="右上.png" class="corner-decoration top-right" alt="装飾右上">
    <img src="左下.png" class="corner-decoration bottom-left" alt="装飾左下">
    <img src="右下.png" class="corner-decoration bottom-right" alt="装飾右下">
    <div class="profile-container">
        <header class="profile-header">
            <div class="profile-icon">
                <img src="icon.jpg.jpg" alt="Icon">
            </div>
            <h1 class="profile-title">Who am I ?</h1>
        </header>

        <main class="profile-body">
            <div class="text-content">
                <p>名前：ヒビ タスク</p>
                <p>2001年。愛知県生まれ。もともとWeb商材の営業をしていたが、鬱病になり退職。</p>
                <p>失業手当のために行ったハローワークでデザイナーコースを勧められ、まんまとデザインの勉強中。</p>
                <p>せっかくならwebデザインも一緒に学びたいと思い、独学でコーディングの勉強中。</p>
                <p>趣味　音楽（聴くだけ）アートトイの収集、筋トレ、ゲーム（ポケモン大好きです。最近Skyrim始めた。）</p>
            </div>
        </main>

        <a href="index.html" class="back-link">BACK TO HOME</a>
    </div>
</body>

</html>
