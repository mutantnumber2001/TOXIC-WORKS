<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOXIC WORKS - SIGNAL</title>
    <style>
        /* --- CSS --- */
        body {
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Arial, sans-serif;
            background-color: #1a001a;
            background-image: url('パターン２.png');
            background-repeat: repeat;
            background-size: 300px auto;
            background-attachment: fixed;
        }

        /* 1. ノイズレイヤー */
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(14, 13, 13, 0.822) 15px, transparent 15px);
            background-size: 4px 4px;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: screen;
            animation: noise-anim 0.15s infinite;
        }

        @keyframes noise-anim {
            0% { transform: translate(0, 0); opacity: 0.3; }
            15% { transform: translate(-8px, 4px); opacity: 0.6; }
            30% { transform: translate(5px, -5px); opacity: 0.2; }
            45% { transform: translate(-4px, 8px); opacity: 0.7; }
            60% { transform: translate(7px, 2px); opacity: 0.3; }
            75% { transform: translate(-6px, -3px); opacity: 0.5; }
            90% { transform: translate(3px, 6px); opacity: 0.2; }
            100% { transform: translate(0, 0); opacity: 0.4; }
        }

        /* 2. 両サイドの警告テキスト */
        .warning-text {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 0.5rem;
            writing-mode: vertical-rl;
            text-transform: uppercase;
            z-index: 10000;
            color: #00c3ff;
            text-shadow: 0 0 10px rgba(204, 255, 0, 0.8);
            pointer-events: none;
            font-family: sans-serif;
        }
        .warning-text.left { left: 20px; }
        .warning-text.right { right: 20px; writing-mode: vertical-lr; }

        /* 3. 四隅の装飾 */
        .corner-decoration {
            position: fixed;
            width: 200px;
            height: auto;
            z-index: 100;
            pointer-events: none;
        }
        .top-left { top: 0; left: 0; }
        .top-right { top: 0; right: 0; }
        .bottom-left { bottom: 0; left: 0; }
        .bottom-right { bottom: 0; right: 0; }

        /* コンテナデザイン */
        .profile-container {
            position: relative;
            max-width: 900px;
            margin: 40px auto;
            background-color: rgba(20, 20, 20, 0.9);
            border: 2px solid #ccff00;
            padding: 50px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .profile-title {
            font-size: 3rem;
            color: #ccff00;
            text-transform: uppercase;
            margin: 0 0 30px 0;
            text-shadow: 0 0 15px rgba(204, 255, 0, 0.6);
        }

        /* SNSボタン */
        .sns-links {
            display: flex;
            gap: 30px;
            margin-bottom: 50px;
            justify-content: center;
        }

        .sns-btn {
            display: flex;
            align-items: center;
            gap: 15px;
            color: #ccff00;
            text-decoration: none;
            border: 1px solid #ccff00;
            padding: 15px 30px;
            background-color: rgba(0, 0, 0, 0.5);
            transition: 0.3s;
        }

        .sns-btn img { width: 30px; height: 30px; }

        .sns-btn:hover {
            background-color: rgba(204, 255, 0, 0.2);
            box-shadow: 0 0 15px rgba(204, 255, 0, 0.5);
            transform: translateY(-3px);
        }

        /* 問い合わせフォーム */
        .contact-form-area {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            border-top: 1px dashed rgba(204, 255, 0, 0.3);
            padding-top: 40px;
        }

        .form-title {
            color: #00c3ff;
            font-size: 1.5rem;
            letter-spacing: 0.3rem;
            text-align: center;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            color: #ccff00;
            margin-bottom: 8px;
            font-size: 0.9rem;
            letter-spacing: 0.1rem;
        }

        .toxic-form input,
        .toxic-form textarea {
            background-color: rgba(0, 0, 0, 0.6);
            border: 1px solid #ccff00;
            color: #ffffff;
            padding: 15px;
            font-family: inherit;
            font-size: 1rem;
            transition: 0.3s;
        }

        .toxic-form input:focus,
        .toxic-form textarea:focus {
            outline: none;
            background-color: rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 15px rgba(204, 255, 0, 0.5);
        }

        .submit-btn {
            background-color: transparent;
            border: 2px solid #ccff00;
            color: #ccff00;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 0.2rem;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: 0.3s;
        }

        .submit-btn:hover {
            background-color: #ccff00;
            color: #000;
            box-shadow: 0 0 20px rgba(204, 255, 0, 0.8);
        }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: #ccff00;
            text-decoration: none;
            border: 1px solid #ccff00;
            padding: 10px 20px;
            transition: 0.3s;
        }

        .back-link:hover { background-color: #ccff00; color: #000; }
    </style>
</head>

<body>
    <div class="noise-overlay"></div>
    <div class="warning-text left">WARNING : HIGH TOXICITY</div>
    <div class="warning-text right">RESTRICTED AREA : LEVEL 04</div>
    <img src="左上.png" class="corner-decoration top-left" alt="装飾左上">
    <img src="右上.png" class="corner-decoration top-right" alt="装飾右上">
    <img src="左下.png" class="corner-decoration bottom-left" alt="装飾左下">
    <img src="右下.png" class="corner-decoration bottom-right" alt="装飾右下">

    <div class="profile-container"> 
        <header class="profile-header">
            <h1 class="profile-title">SIGNAL</h1>
        </header>

        <main class="signal-body">
            <div class="sns-links">
                <a href="https://x.com/hibitasuku" target="_blank" class="sns-btn">
                    <img src="logo.svg" alt="X"> <span>X (Twitter)</span>
                </a>
                <a href="https://instagram.com/mutant_number2001" target="_blank" class="sns-btn">
                    <img src="Instagram_Glyph_Gradient.svg" alt="Instagram"> <span>Instagram</span>
                </a>
            </div>

            <div class="contact-form-area">
                <h2 class="form-title">CONTACT</h2>
                <form action="https://formspree.io/f/mykdodly" method="POST" class="toxic-form">
                    <div class="input-group">
                        <label for="name">NAME</label>
                        <input type="text" id="name" name="name" placeholder="信号の送り主" required>
                    </div>
                    <div class="input-group">
                        <label for="email">EMAIL</label>
                        <input type="email" id="email" name="email" placeholder="返信先アドレス" required>
                    </div>
                    <div class="input-group">
                        <label for="message">MESSAGE</label>
                        <textarea id="message" name="message" rows="5" placeholder="通信内容を入力してください" required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">SEND SIGNAL</button>
                </form>
            </div>
        </main>

        <a href="index.html" class="back-link">BACK TO HOME</a>
    </div>
</body>
</html>
